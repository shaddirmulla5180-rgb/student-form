<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration System</title>
    <link
      rel="stylesheet"
      href=style111.css
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>
          <i class="fas fa-graduation-cap"></i> Student Registration System
        </h1>
        <p>Enroll for the upcoming semester</p>
      </header>

      <div class="registration-form">
        <form
          id="studentForm"
          onsubmit="
            event.preventDefault();
            registerStudent();
          "
        >
          <div class="form-section">
            <h2>Personal Information</h2>
            <div class="form-row">
              <div class="form-group">
                <label for="first_name"
                  ><i class="fas fa-user"></i> First Name *</label
                >
                <input type="text" id="first_name" name="first_name" required />
              </div>
              <div class="form-group">
                <label for="last_name">Last Name *</label>
                <input type="text" id="last_name" name="last_name" required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="email"
                  ><i class="fas fa-envelope"></i> Email *</label
                >
                <input type="email" id="email" name="email" required />
              </div>
              <div class="form-group">
                <label for="phone"><i class="fas fa-phone"></i> Phone *</label>
                <input type="tel" id="phone" name="phone" required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="date_of_birth"
                  ><i class="fas fa-calendar"></i> Date of Birth *</label
                >
                <input
                  type="date"
                  id="date_of_birth"
                  name="date_of_birth"
                  required
                />
              </div>
              <div class="form-group">
                <label for="gender"
                  ><i class="fas fa-venus-mars"></i> Gender *</label
                >
                <select id="gender" name="gender" required>
                  <option value="">Select Gender</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                  <option value="other">Other</option>
                  <option value="prefer-not-to-say">Prefer not to say</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h2>Address Information</h2>
            <div class="form-group">
              <label for="address"
                ><i class="fas fa-map-marker-alt"></i> Street Address *</label
              >
              <input type="text" id="address" name="address" required />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="city">City *</label>
                <input type="text" id="city" name="city" required />
              </div>
              <div class="form-group">
                <label for="state">State/Province *</label>
                <input type="text" id="state" name="state" required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="zip_code">ZIP/Postal Code *</label>
                <input type="text" id="zip_code" name="zip_code" required />
              </div>
              <div class="form-group">
                <label for="country">Country *</label>
                <select id="country" name="country" required>
                  <option value="">Select Country</option>
                  <option value="USA">United States</option>
                  <option value="Canada">Canada</option>
                  <option value="UK">United Kingdom</option>
                  <option value="Australia">Australia</option>
                  <option value="India">India</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h2>Academic Information</h2>
            <div class="form-row">
              <div class="form-group">
                <label for="course"><i class="fas fa-book"></i> Course *</label>
                <select id="course" name="course" required>
                  <option value="">Select Course</option>
                  <option value="Computer Science">Computer Science</option>
                  <option value="Engineering">Engineering</option>
                  <option value="Business Administration">
                    Business Administration
                  </option>
                  <option value="Medicine">Medicine</option>
                  <option value="Arts">Arts</option>
                  <option value="Law">Law</option>
                </select>
              </div>
              <div class="form-group">
                <label for="semester">Semester *</label>
                <select id="semester" name="semester" required>
                  <option value="">Select Semester</option>
                  <option value="Fall 2024">Fall 2024</option>
                  <option value="Spring 2025">Spring 2025</option>
                  <option value="Summer 2025">Summer 2025</option>
                  <option value="Fall 2025">Fall 2025</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-submit">
              <i class="fas fa-paper-plane"></i> Register Student
            </button>
            <button type="reset" class="btn-reset">
              <i class="fas fa-undo"></i> Reset Form
            </button>
          </div>
        </form>

        <div id="message" class="message" style="display: none"></div>
      </div>

      <div class="students-list">
        <h2><i class="fas fa-list"></i> Registered Students</h2>
        <div class="table-responsive">
          <table id="studentsTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Course</th>
                <th>Semester</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="studentsList">
              <!-- Students will be loaded here -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
